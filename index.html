<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#263a2f">
    <title>ASL Dice</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="roller-panel" aria-label="Dice roller">
        <header class="app-header">
          <div>
            <p class="kicker">Advanced Squad Leader</p>
            <h1>ASL Dice</h1>
          </div>
          <div class="header-actions" aria-label="Log actions">
            <button class="icon-button" id="open-setup" type="button" aria-label="Open scenario setup" title="Open scenario setup">
              Setup
            </button>
            <button class="icon-button" id="delete-log-entry" type="button" aria-label="Delete latest log entry" title="Delete latest log entry">
              Del
            </button>
            <button class="icon-button" id="clear-log" type="button" aria-label="Clear roll log" title="Clear roll log">
              Clear
            </button>
          </div>
        </header>

        <div class="control-group" aria-label="Side">
          <button class="segmented active" type="button" data-side="Axis">Axis</button>
          <button class="segmented" type="button" data-side="Allied">Allied</button>
        </div>

        <div class="mode-grid" aria-label="Roll type">
          <button class="mode-button active" type="button" data-mode="MC">MC</button>
          <button class="mode-button" type="button" data-mode="IFT">IFT</button>
          <button class="mode-button" type="button" data-mode="TC">TC</button>
          <button class="mode-button" type="button" data-mode="SW">SW</button>
          <button class="mode-button" type="button" data-mode="HIP">HIP</button>
          <button class="mode-button" type="button" data-mode="Smoke">Smoke</button>
          <button class="mode-button" type="button" data-mode="Amb">Amb</button>
          <button class="mode-button" type="button" data-mode="CC">CC</button>
          <button class="mode-button" type="button" data-mode="TH">TH</button>
          <button class="mode-button" type="button" data-mode="RS">RS</button>
          <button class="mode-button" type="button" data-mode="GEN">GEN</button>
        </div>

        <div class="ift-panel hidden" id="ift-panel">
          <div class="ift-button-grid ift-firepower-grid" aria-label="IFT firepower">
            <button class="ift-option" type="button" data-firepower="1">1</button>
            <button class="ift-option" type="button" data-firepower="2">2</button>
            <button class="ift-option" type="button" data-firepower="4">4</button>
            <button class="ift-option" type="button" data-firepower="6">6</button>
            <button class="ift-option active" type="button" data-firepower="8">8</button>
            <button class="ift-option" type="button" data-firepower="12">12</button>
            <button class="ift-option" type="button" data-firepower="16">16</button>
            <button class="ift-option" type="button" data-firepower="20">20</button>
            <button class="ift-option" type="button" data-firepower="24">24</button>
            <button class="ift-option" type="button" data-firepower="30">30</button>
            <button class="ift-option" type="button" data-firepower="36">36+</button>
          </div>

          <div class="ift-button-grid ift-modifier-grid" aria-label="IFT modifier">
            <button class="ift-option" type="button" data-modifier="-6">-6</button>
            <button class="ift-option" type="button" data-modifier="-5">-5</button>
            <button class="ift-option" type="button" data-modifier="-4">-4</button>
            <button class="ift-option" type="button" data-modifier="-3">-3</button>
            <button class="ift-option" type="button" data-modifier="-2">-2</button>
            <button class="ift-option" type="button" data-modifier="-1">-1</button>
            <button class="ift-option active" type="button" data-modifier="0">0</button>
            <button class="ift-option" type="button" data-modifier="1">+1</button>
            <button class="ift-option" type="button" data-modifier="2">+2</button>
            <button class="ift-option" type="button" data-modifier="3">+3</button>
            <button class="ift-option" type="button" data-modifier="4">+4</button>
            <button class="ift-option" type="button" data-modifier="5">+5</button>
            <button class="ift-option" type="button" data-modifier="6">+6</button>
          </div>
        </div>

        <div class="hip-panel hidden" id="hip-panel">
          <div class="hip-status" id="hip-status"></div>
          <div class="hip-location-grid" id="hip-location-grid" aria-label="HIP locations"></div>
        </div>

        <div class="random-selection-panel hidden" id="random-selection-panel">
          <div class="random-selection-grid" aria-label="Random selection dice">
            <button class="random-selection-option active" type="button" data-random-dice="2">2</button>
            <button class="random-selection-option" type="button" data-random-dice="3">3</button>
            <button class="random-selection-option" type="button" data-random-dice="4">4</button>
            <button class="random-selection-option" type="button" data-random-dice="5">5</button>
          </div>
        </div>

        <button class="roll-button" id="roll-button" type="button">Roll</button>
      </section>

      <section class="log-panel" aria-label="Roll history">
        <div class="log-header">
          <h2>Log</h2>
          <span id="log-count">0 rolls</span>
        </div>
        <ol class="roll-log" id="roll-log"></ol>
      </section>
    </main>

    <div class="setup-overlay hidden" id="setup-overlay">
      <section class="setup-dialog" aria-label="Scenario setup">
        <div class="setup-header">
          <h2>Setup</h2>
          <button class="icon-button" id="close-setup" type="button">Cancel</button>
        </div>
        <label class="setup-field">
          <span>HIP locations</span>
          <textarea id="hip-locations-input" rows="3" placeholder="W5N X3NE X5NW W13E"></textarea>
        </label>
        <label class="setup-field">
          <span>Guns</span>
          <input id="hip-gun-count" type="number" min="0" step="1" value="1">
        </label>
        <p class="setup-message" id="setup-message"></p>
        <button class="roll-button setup-create-button" id="create-hip-setup" type="button">Create</button>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
